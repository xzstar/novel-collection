        - generic [ref=e137]: 第2卷 第1章 血路突围
        - generic [ref=e138]:
          - paragraph [ref=e139]: 虚空如墨，星辉似血。
          - paragraph [ref=e140]: 虫洞出口处，空间如水波般扭曲，三道身影从中跌出。叶星尚未稳住身形，便觉四周杀机四伏——数十艘星宫战船已列阵以待，灵能炮口齐指三人，每一道炮口都闪烁着致命的蓝芒。
          - paragraph [ref=e141]: “叶星小儿，交出碎片，饶你不死！否则魂飞魄散！”
          - paragraph [ref=e142]: 一道苍老而威严的声音从舰队中央传来。叶星循声望去，只见一艘通体漆黑的旗舰之上，一位身着紫金道袍的老者负手而立。老者双目如电，周身灵压如山，赫然是灵婴期修为。
          - paragraph [ref=e143]: “星宫灵婴期长老……”晶璃低声呢喃，冰晶般的身躯微微颤抖。
          - paragraph [ref=e144]: 铁心一步踏前，机械身躯发出“咔嚓”声响，挡在叶星身前：“老大，你先走，我断后！”
          - paragraph [ref=e145]: 叶星没有答话，只是缓缓闭上双眼。他暗中催动虚空印记，神识如蛛网般向四周蔓延。虚空中每一道褶皱、每一处波动都清晰地映入脑海——东侧空间波动异常，似有隐藏裂缝；西侧灵能密集，应是舰队主力所在；南侧星宫弟子结阵，灵力流转如网；北侧……
          - paragraph [ref=e146]: “想要碎片？”叶星猛然睁眼，嘴角勾起一抹冷笑，“拿命来换！”
          - paragraph [ref=e147]: 话音未落，他身形一闪，虚空印记催动，整个人如鬼魅般消失在原地。
          - paragraph [ref=e148]: “找死！”灵婴期长老冷哼一声，大手一挥，“结阵！”
          - paragraph [ref=e149]: 数十名筑基期星宫弟子齐声应诺，手中法诀变幻，灵光交织成一张巨网，向叶星罩去。这阵法名为“天罗地网”，专克空间遁术，一旦被困，便是灵婴期修士也难以脱身。
          - paragraph [ref=e150]: 然而叶星早有准备。他并未直接冲向包围圈，而是以虚空印记连续瞬移，每一次出现都在阵法的薄弱之处。星核碎片在体内震颤，一股玄妙的力量涌入四肢百骸——那是虚空仙尊最后注入的力量，虽只让他的修为提升至练星期九层巅峰，却让他对空间法则的感悟更上一层楼。
          - paragraph [ref=e151]: “破！”
          - paragraph [ref=e152]: 叶星低喝一声，右手虚握，星核碎片之力凝聚成一柄无形利刃，狠狠斩向阵法的一处阵眼。只听“咔嚓”一声脆响，灵光巨网出现一道裂痕，随即如蛛网般蔓延开来。
          - paragraph [ref=e153]: “不好！”灵婴期长老脸色一变，“这小子竟能看破阵眼！”
          - paragraph [ref=e154]: “晶璃，铁心，向东侧突围！”叶星大喝。
          - paragraph [ref=e155]: 晶璃应声而动，双手结印，周身寒气弥漫。她本就是晶族之体，对冰系法则有着天生的亲和力。只见她双掌推出，一面冰晶巨盾凭空凝聚，将数道灵能炮火尽数挡下。
          - paragraph [ref=e156]: “轰！轰！轰！”
          - paragraph [ref=e157]: 炮火轰击在冰盾上，激起漫天冰屑。晶璃闷哼一声，嘴角溢出一缕淡蓝色的血液，却咬牙不退。
          - paragraph [ref=e158]: 铁心趁机怒吼一声，机械身躯暴涨三分，双拳如流星般砸向挡路的星宫弟子。他本是机械族，肉身坚逾精钢，此刻全力爆发，竟将两名筑基期弟子直接轰飞。
          - paragraph [ref=e159]: “拦住他们！”灵婴期长老厉喝，亲自出手。
          - paragraph [ref=e160]: 他抬手虚按，一只巨大的灵力手掌从天而降，直拍向晶璃。这一掌蕴含灵婴期修士的全力一击，若是拍实，晶璃必死无疑。
          - paragraph [ref=e161]: “晶璃！”叶星瞳孔骤缩。
          - paragraph [ref=e162]: 他来不及多想，虚空印记疯狂运转，身形瞬间出现在晶璃身前。面对那遮天蔽日的巨掌，叶星眼中闪过一丝决然——他双手结印，虚空印记爆发出刺目的白光，强行扭曲周围的空间。
          - paragraph [ref=e163]: “给我——转！”
          - paragraph [ref=e164]: 叶星怒吼，虚空之力如潮水般涌出，将那巨掌的轨迹硬生生偏移了三寸。巨掌擦着晶璃的身侧轰在虚空中，激起一圈圈空间涟漪。
          - paragraph [ref=e165]: 然而代价是惨重的。
          - paragraph [ref=e166]: 叶星只觉得五脏六腑仿佛被撕裂，一口鲜血喷涌而出，整个人如断线风筝般倒飞出去。虚空印记的反噬之力远超他的承受极限，体内星脉寸寸断裂，灵力几近枯竭。
          - paragraph [ref=e167]: “叶星！”晶璃惊呼，飞身接住叶星。
          - paragraph [ref=e168]: “别管我，快走！”叶星咬牙道，声音虚弱却坚定，“东侧……有空间裂缝……”
          - paragraph [ref=e169]: 铁心闻言，一把背起晶璃，另一只手揽住叶星，机械双腿爆发出惊人的速度，向东侧冲去。
          - paragraph [ref=e170]: “想逃？”灵婴期长老冷笑，身形一闪，已拦在三人前方，“老夫倒要看看，你们能逃到哪里去！”
          - paragraph [ref=e171]: 他抬手虚抓，一股无形的吸力将三人牢牢锁定。铁心只觉得身体仿佛被一只无形的大手攥住，寸步难行。
          - paragraph [ref=e172]: 叶星挣扎着抬起头，眼中闪过一丝疯狂。他咬破舌尖，以精血催动虚空印记，体内最后的灵力如决堤般涌入印记之中。
          - paragraph [ref=e173]: “开！”
          - paragraph [ref=e174]: 随着一声嘶吼，叶星身前虚空裂开一道缝隙。那缝隙只有一人宽，却散发出幽深的气息，仿佛通往另一个世界。
          - paragraph [ref=e175]: “走！”叶星用尽最后力气，将铁心和晶璃推向裂缝。
          - paragraph [ref=e176]: “老大！”铁心惊呼。
          - paragraph [ref=e177]: “快走！”叶星厉喝，眼中满是决绝。
          - paragraph [ref=e178]: 铁心咬牙，抱着晶璃纵身跃入裂缝。叶星紧随其后，却在即将进入裂缝的瞬间，被灵婴期长老一掌拍中后背。
          - paragraph [ref=e179]: “噗——”
          - paragraph [ref=e180]: 叶星喷出一口鲜血，整个人跌入裂缝。裂缝在他身后迅速闭合，将灵婴期长老的怒吼隔绝在外。
          - paragraph [ref=e181]: “给我轰！轰碎这道裂缝！”灵婴期长老暴怒下令。
          - paragraph [ref=e182]: 数十艘战船同时开火，灵能炮火如暴雨般轰向裂缝所在的位置。然而裂缝已经闭合，只留下一片扭曲的空间波动。
          - paragraph [ref=e183]: “长老，裂缝已闭合，无法追踪。”一名星宫弟子禀报道。
          - paragraph [ref=e184]: 灵婴期长老脸色铁青，眼中闪过一丝阴鸷：“哼，他们逃不远。那道裂缝通往的是……虚空乱流深处。”
          - paragraph [ref=e185]: 他顿了顿，冷笑道：“传令下去，封锁这片星域，一只苍蝇也不许放出去！”
          - paragraph [ref=e186]: “是！”
          - paragraph [ref=e187]: "---"
          - paragraph [ref=e188]: 黑暗。
          - paragraph [ref=e189]: 无尽的黑暗。
          - paragraph [ref=e190]: 叶星只觉得身体在虚空中不断下坠，四周一片死寂，连呼吸声都听不见。他想要催动灵力，却发现体内星脉寸断，灵力枯竭，连动一根手指都做不到。
          - paragraph [ref=e191]: “晶璃……铁心……”他喃喃道，声音在虚空中消散。
          - paragraph [ref=e192]: 就在这时，一股古老而强大的气息从裂缝深处传来。那气息浩瀚如星海，深邃如宇宙，仿佛来自远古洪荒，又仿佛来自未来彼岸。
          - paragraph [ref=e193]: 叶星心头一震，勉强睁开双眼。黑暗中，他似乎看到了一双巨大的眼睛，正冷冷地注视着他。
          - paragraph [ref=e194]: 那眼睛……不属于人类。
          - paragraph [ref=e195]: 叶星想要看清，意识却越来越模糊。他只觉得身体越来越轻，仿佛要融入这片虚空之中。
          - paragraph [ref=e196]: “父亲……我……找到答案了吗……”
          - paragraph [ref=e197]: 他喃喃自语，意识彻底陷入黑暗。
          - paragraph [ref=e198]: 而在意识消散的最后一刻，他似乎听到了一声叹息，悠远而苍凉，仿佛跨越了万古时空。
          - paragraph [ref=e199]: 那叹息中，似乎藏着什么秘密。
          - paragraph [ref=e200]: 又或者，是某种召唤。
