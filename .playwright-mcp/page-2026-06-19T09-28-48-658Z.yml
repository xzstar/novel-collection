        - generic [ref=e53]: 第1卷 第10章 绝境星门
        - generic [ref=e54]:
          - paragraph [ref=e55]: 灰色空间之中，星光如碎汞般飘散，无数双猩红眼睛自前方虚空浮现，如暗夜中的血月，密密麻麻，层层叠叠。那些眼睛没有瞳仁，只有无尽的猩红，仿佛深渊凝视着凡尘。
          - paragraph [ref=e56]: 叶星握紧星光长剑，剑身流转着淡金色的星纹，那是融合星核碎片后留下的印记。他眉心星痕微微发光，试图以虚空灵根感知这些冥族眼睛的弱点——然而，神识触及的刹那，一股冰冷刺骨的意志如毒蛇般钻入识海。
          - paragraph [ref=e57]: “持钥者……你终将成为冥族之奴……”
          - paragraph [ref=e58]: 低语声如万千虫蚁啃噬神魂，叶星闷哼一声，剑尖微颤。他咬破舌尖，以剧痛保持清醒，怒吼道：“我是混沌之子，但绝不会成为你们的钥匙！”
          - paragraph [ref=e59]: 身后，星宫少主冷笑声传来：“冥族意志岂是你能抗衡的？交出星核碎片，本少主或可留你全尸。”
          - paragraph [ref=e60]: 叶星回头，只见星宫少主手持血色长剑，周身环绕着星辰虚影，灵压如潮水般席卷而来。他身后，灰色空间裂开一道缝隙，隐约可见星宫舰队的身影——那少主本体已然追至，不再是投影。
          - paragraph [ref=e61]: “叶星，小心！”晶璃低喝，双手结印，冰晶屏障骤然展开，将三人笼罩。她晶族外壳浮现裂痕，那是之前燃烧精血的后遗症，但眼神依旧坚定。
          - paragraph [ref=e62]: 铁心操控机械残骸组成护盾，金属碰撞声刺耳：“少主交给我，你对付那些眼睛！”
          - paragraph [ref=e63]: “你们撑不住的。”叶星咬牙，催动眉心星痕，试图以虚空灵根撕裂空间，将三人传送出去。然而，冥族低语如跗骨之蛆，不断侵蚀他的意识，虚空印记闪烁不定，难以凝聚。
          - paragraph [ref=e64]: 前方，无数冥族眼睛突然旋转，形成漩涡。漩涡中心，一道血色光柱冲天而起，化作一只巨大的猩红之眼——那眼睛足有百丈之巨，瞳孔中倒映着叶星的身影，仿佛在审视他的灵魂。
          - paragraph [ref=e65]: “这是……冥族意志投影！”叶星瞳孔骤缩。
          - paragraph [ref=e66]: 他曾在记忆碎片中见过这一幕——远古时代，冥族之王以意志投影侵蚀星界之门，试图打开通道，让冥族大军入侵这片星域。最终，白发星仙以自身为代价，将冥族封印于星门深处。
          - paragraph [ref=e67]: 如今，封印松动了。
          - paragraph [ref=e68]: “持钥者，开门者，你逃不掉的……”猩红之眼发出低沉的声音，如雷霆炸响，“你的虚空灵根，正是打开封印的钥匙！”
          - paragraph [ref=e69]: 叶星握紧剑柄，眼中闪过决绝：“那我就毁了这把钥匙！”
          - paragraph [ref=e70]: 他催动虚空炼星诀，丹田虚空晶体剧烈震动，金色星力与血色纹路交织。他抬手，星光长剑化作一道金色匹练，斩向猩红之眼。
          - paragraph [ref=e71]: 轰——
          - paragraph [ref=e72]: 剑光斩在眼睛上，激起层层涟漪。猩红之眼纹丝不动，反而射出无数血色丝线，如蛛网般缠绕而来。叶星闪避不及，左臂被丝线缠住，一股阴冷的力量侵入体内，试图吞噬他的星力。
          - paragraph [ref=e73]: “叶星！”晶璃惊呼，双手结印，冰晶风暴骤然爆发，将血色丝线冻结。她身形一闪，挡在叶星身前，晶刃斩断丝线，“小心，这些丝线能侵蚀星力！”
          - paragraph [ref=e74]: 铁心怒吼一声，机械身躯爆发刺目光芒，双臂化作巨炮，轰向猩红之眼。灵能光束如暴雨般倾泻，然而猩红之眼只是微微颤动，便吸收了所有攻击。
          - paragraph [ref=e75]: “没用的。”星宫少主冷笑，身形一闪，出现在叶星身后，血色长剑直刺后心，“你的命，本少主收下了！”
          - paragraph [ref=e76]: 叶星瞳孔骤缩，强行转身，星光长剑格挡。铛——金铁交击声震耳欲聋，叶星只觉得手臂发麻，身形倒飞而出，撞在灰色空间壁上。
          - paragraph [ref=e77]: “练星期修为，也敢与本少主抗衡？”星宫少主冷笑，血色长剑挽了个剑花，灵压如山岳般压下，“今日便是你的葬身之地！”
          - paragraph [ref=e78]: 他抬手，血色长剑化作一道血虹，直刺叶星眉心。
          - paragraph [ref=e79]: 叶星咬牙，催动虚空灵根，试图撕裂空间闪避。然而，冥族低语骤然加剧，他的意识一阵模糊，虚空印记失控，空间扭曲之力瞬间消散。
          - paragraph [ref=e80]: “完了……”叶星眼中闪过绝望。
          - paragraph [ref=e81]: 就在此时，晶璃突然出现在他身前，以身躯挡下血虹。噗——血虹贯穿晶璃胸口，晶族外壳碎裂，冰晶飞溅。
          - paragraph [ref=e82]: “晶璃！”叶星怒吼。
          - paragraph [ref=e83]: 晶璃嘴角溢出一缕蓝色血液，却回头对他露出一个微笑：“快走……我撑不了多久……”
          - paragraph [ref=e84]: “不！”叶星眼中闪过血色，他握紧星光长剑，催动虚空炼星诀，丹田虚空晶体疯狂震动。金色星力与血色纹路交织，他怒吼一声，剑光如雷霆般斩向星宫少主。
          - paragraph [ref=e85]: 星宫少主脸色微变，挥剑格挡。轰——两股力量碰撞，激起能量风暴，将灰色空间撕裂出道道裂缝。
          - paragraph [ref=e86]: 叶星趁机抱住晶璃，后退数丈。铁心操控机械残骸组成护盾，挡在两人身前：“叶星，想办法逃！我挡住他们！”
          - paragraph [ref=e87]: “逃不掉的。”叶星咬牙，看向前方猩红之眼，又看向身后星宫少主，眼中闪过决绝，“只能拼了！”
          - paragraph [ref=e88]: 他抬手，怀中星图碎片突然发光，与眉心星痕产生共鸣。碎片化作一道金色流光，没入叶星眉心，一幅完整的星图在他识海中展开——那是星界之门内部的空间结构图，标注着无数通道和节点。
          - paragraph [ref=e89]: 其中，有一个节点闪烁着微弱的光芒——那是通往出口的空间裂缝！
          - paragraph [ref=e90]: “找到了！”叶星眼中闪过喜色，他催动虚空灵根，强行撕裂空间，一道扭曲的裂缝出现在三人身前。
          - paragraph [ref=e91]: “走！”叶星抱起晶璃，拉着铁心，冲入裂缝。
          - paragraph [ref=e92]: “想逃？”星宫少主冷笑，抬手一挥，血色长剑化作无数剑影，追入裂缝。
          - paragraph [ref=e93]: 叶星咬牙，以星光长剑斩碎剑影，但仍有数道剑影贯穿他的身体。鲜血飞溅，叶星闷哼一声，却死死护住晶璃和铁心，冲入裂缝深处。
          - paragraph [ref=e94]: 裂缝闭合的瞬间，叶星回头，看到猩红之眼射出无数血色丝线，追入裂缝。他眼中闪过决绝，引爆丹田虚空晶体部分能量，形成一道空间屏障，暂时挡住追兵。
          - paragraph [ref=e95]: 轰——
          - paragraph [ref=e96]: 空间塌陷，裂缝彻底闭合。叶星三人从虚空中跌出，落在一片荒芜的遗迹中。
          - paragraph [ref=e97]: "---"
          - paragraph [ref=e98]: 遗迹中央，悬浮着一枚暗淡的星核碎片，散发着微弱的光芒。周围，无数星纹交织成阵法，仿佛在守护着什么。
          - paragraph [ref=e99]: 叶星挣扎起身，检查晶璃和铁心的伤势。晶璃胸口被贯穿，晶族外壳碎裂大半，气息微弱。铁心机械身躯多处破损，左臂断裂，电流滋滋作响。
          - paragraph [ref=e100]: “你们……”叶星眼中闪过愧疚，“是我连累了你们。”
          - paragraph [ref=e101]: “说什么傻话。”晶璃勉强一笑，“我们是同伴。”
          - paragraph [ref=e102]: 铁心咧嘴一笑，机械声音沙哑：“老子还没死呢，别哭丧着脸。”
          - paragraph [ref=e103]: 叶星咬牙，正要说什么，突然，遗迹中央的星核碎片发光，一道虚影浮现——那是一位身着星袍的老者，面容苍老，眼神深邃，周身环绕着星辰虚影。
          - paragraph [ref=e104]: “持钥者……你终于来了。”老者声音虚弱，却带着一股威严，“老朽是虚空仙尊，这座遗迹的主人。”
          - paragraph [ref=e105]: 叶星瞳孔骤缩：“虚空仙尊？您还活着？”
          - paragraph [ref=e106]: “残魂而已。”虚空仙尊摇头，看向叶星眉心星痕，“你融合了星核碎片，说明你已经通过星界之门的试炼。但老朽必须告诉你一个真相——星界之门已被冥族意志污染，星宫少主只是棋子，真正的主谋是星宫之主。”
          - paragraph [ref=e107]: 叶星震惊：“星宫之主？他为什么要这么做？”
          - paragraph [ref=e108]: “为了渡劫。”虚空仙尊眼中闪过悲凉，“星宫之主修为已达融界期大圆满，却迟迟无法突破大乘期。他献祭虚空灵根者，以冥族之力强行渡劫，妄图踏入大乘期，甚至飞升星界。”
          - paragraph [ref=e109]: 他抬手，一道星光没入叶星眉心：“老朽将最后的力量注入你的星核，助你稳固修为。但你必须记住——必须找到其他四枚碎片，否则宇宙星灵气将枯竭，整个星域都会沦为冥族的猎场。”
          - paragraph [ref=e110]: 叶星咬牙：“其他碎片在哪里？”
          - paragraph [ref=e111]: “散落在不同星域，各有守护者守护。”虚空仙尊声音渐弱，“老朽时间不多了……记住，星宫之主已经盯上你了，你必须尽快提升实力，否则……”
          - paragraph [ref=e112]: 话音未落，虚空仙尊残魂化作点点星光，消散在空气中。叶星只觉得眉心星痕一热，一股磅礴的星力涌入体内，修复着他的伤势，同时将他的修为推至练星期九层巅峰。
          - paragraph [ref=e113]: 他握紧拳头，眼中闪过坚定：“我会找到其他碎片，绝不会让冥族得逞。”
          - paragraph [ref=e114]: 就在这时，遗迹突然震动，外界传来灵能战舰的轰鸣声。叶星通过虚空感知发现，虫洞出口已被数百艘星宫战舰封锁，一名灵婴期长老的神识扫过遗迹。
          - paragraph [ref=e115]: “交出星核碎片，饶你不死。”长老冷笑传音，声音如雷霆炸响，“否则，这遗迹就是你的坟墓。”
          - paragraph [ref=e116]: 叶星握紧手中半块星核，眼中燃起不屈火焰。他回头，看向挣扎起身的晶璃和铁心，低声道：“我们不会死在这里，我发誓。”
          - paragraph [ref=e117]: 晶璃勉强一笑，晶刃凝聚：“那就杀出去。”
          - paragraph [ref=e118]: 铁心咧嘴，机械手臂重组：“老子早就想干一票大的了。”
          - paragraph [ref=e119]: 叶星点头，催动虚空灵根，感知着遗迹的结构。他眼中闪过决绝——既然无路可退，那就杀出一条血路！
          - paragraph [ref=e120]: 他抬手，星光长剑凝聚，剑身流转着金色星纹。他看向虫洞出口，那里，数百艘星宫战舰严阵以待，灵婴长老的神识如利剑般锁定着他。
          - paragraph [ref=e121]: “来吧。”叶星低语，眼中燃起战意，“让我看看，星宫到底有多强。”
