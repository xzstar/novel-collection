    - article [ref=e53]:
      - generic [ref=e134]:
        - heading "第3章 血路跃迁" [level=1] [ref=e135]
        - generic [ref=e136]: 第1卷 第3章
        - generic [ref=e137]:
          - paragraph [ref=e138]: 一、生死一线
          - paragraph [ref=e139]: 暗星域的天幕被一道金色剑光撕裂，如九天银河倒泻，直斩向星火号。
          - paragraph [ref=e140]: “全力催动引擎！”叶星嘶吼，双手按在驾驶舱的灵能阵盘上，丹田内的虚空灵根疯狂震颤，幽蓝色的光芒从指尖溢出，融入飞船的跃迁系统。
          - paragraph [ref=e141]: 晶璃盘膝坐在副驾驶位，淡紫色的双眸紧闭，周身灵能纹路流转如星河。她双手结印，晶族特有的能量如丝线般缠绕在飞船的灵脉管线上，辅助稳定能量输出。
          - paragraph [ref=e142]: “跃迁坐标已锁定仙遗星入口！”铁心粗犷的声音从操作台传来，机械手臂在光幕上飞速敲击，“但血色结界正在侵蚀跃迁通道，我们只有三息时间！”
          - paragraph [ref=e143]: 叶星抬头，透过驾驶舱的透明晶壁，看到虚无尘脚踏混沌莲花，立于虚空之中。他白衣胜雪，面容冷峻，手中长剑高举，剑尖凝聚着一道刺目的金光——那是混沌灵根催动的星域禁术，一剑可碎星辰。
          - paragraph [ref=e144]: “虚空灵根？不过是星宫实验的失败品罢了。”虚无尘的声音淡漠如冰，仿佛在陈述一个既定事实。
          - paragraph [ref=e145]: 他挥剑。
          - paragraph [ref=e146]: 剑光如瀑，撕裂虚空，所过之处空间崩塌，露出漆黑的虚无。那剑光带着毁灭一切的气息，直斩向星火号。
          - paragraph [ref=e147]: 叶星咬牙，将虚空灵根的力量毫无保留地注入引擎。丹田内，半透明的虚空晶体剧烈震颤，表面浮现出一道道裂纹——那是强行催动灵根的反噬。
          - paragraph [ref=e148]: “给我——走！”
          - paragraph [ref=e149]: 星火号周围的空间开始扭曲，形成一个幽蓝色的漩涡。飞船的船体在空间之力下拉伸变形，仿佛要被撕裂。
          - paragraph [ref=e150]: 剑光触及船体的瞬间，漩涡猛地收缩，星火号消失在原地。
          - paragraph [ref=e151]: 虚无尘收剑，冷冷看着飞船消失的方向，嘴角勾起一抹冷笑：“逃吧，仙遗星就是你的坟墓。”
          - paragraph [ref=e152]: 二、空间夹层
          - paragraph [ref=e153]: 星火号在空间夹层中高速穿行，四周是扭曲的光影和破碎的空间碎片。正常跃迁只需三息，但血色结界的力量渗透进来，在通道内形成一道道空间乱流。
          - paragraph [ref=e154]: “稳住船体！”铁心大吼，机械手臂死死抓住操作台，灵能管线爆发出刺目的光芒。
          - paragraph [ref=e155]: 叶星七窍流血，丹田内的虚空晶体已布满裂纹，每一次催动都带来撕裂般的剧痛。但他不敢停下——一旦在空间夹层中失去动力，飞船会被空间乱流撕成碎片。
          - paragraph [ref=e156]: 晶璃睁开眼，看到叶星的状态，脸色微变。她伸手按在叶星后背，晶族能量如清泉般涌入，修复他受损的经脉。
          - paragraph [ref=e157]: “别管我，稳住跃迁通道！”叶星嘶哑道。
          - paragraph [ref=e158]: “你死了，我们一样出不去。”晶璃冷冷道，语气却带着一丝关切。
          - paragraph [ref=e159]: 就在这时，铁心惊呼：“不好！跃迁通道被血色符文侵蚀，即将崩溃！”
          - paragraph [ref=e160]: 叶星抬头，看到通道壁面上浮现出一道道血色的冥族符文，如毒蛇般蔓延，侵蚀着空间结构。那些符文与体内暗渊留下的印记产生共鸣，一股灼热感从丹田升起。
          - paragraph [ref=e161]: “是冥族的力量……”叶星咬牙，强行引导印记的力量，试图与血色符文沟通。
          - paragraph [ref=e162]: 印记释放出一股冰冷的能量，沿着经脉涌入跃迁通道。血色符文仿佛感应到同源的气息，开始向印记靠拢，在通道中形成一条新的路径。
          - paragraph [ref=e163]: “那是通往仙遗星核心的路径！”铁心惊呼，“但路径极不稳定，随时可能崩塌！”
          - paragraph [ref=e164]: 叶星没有犹豫，将最后一丝虚空灵根的力量注入引擎，引导飞船冲入那条血色路径。
          - paragraph [ref=e165]: 飞船剧烈震荡，船体发出刺耳的金属呻吟声。驾驶舱内的灵能管线爆裂，火花四溅。晶璃用身体护住叶星，晶族能量形成一道护盾，挡住飞溅的碎片。
          - paragraph [ref=e166]: 三息后，飞船冲出通道，坠落在仙遗星表面。
          - paragraph [ref=e167]: 三、星仙遗迹
          - paragraph [ref=e168]: 星火号坠入一片荒芜的平原，船体在地面上犁出一道长长的沟壑，最终撞上一座残破的祭坛才停下。
          - paragraph [ref=e169]: 叶星艰难地推开舱门，踉跄走出。眼前的景象让他倒吸一口凉气——
          - paragraph [ref=e170]: 仙遗星的天空是诡异的暗紫色，星灵气浓郁得几乎凝成实质，但空气中弥漫着一股腐朽的死气，仿佛有无数亡魂在低语。
          - paragraph [ref=e171]: 远处，一座巨大的星仙祭坛矗立着，通体由白玉砌成，表面刻满古老的星纹。祭坛中央悬浮着一枚拳头大小的晶体，通体漆黑，表面流转着幽蓝色的光芒——与叶星在虚空祭坛见过的虚空道种相似，但气息更加深邃。
          - paragraph [ref=e172]: 祭坛周围散落着数十艘星宫执法舰的残骸，船体上布满裂纹，灵能管线裸露在外，显然已经废弃多年。
          - paragraph [ref=e173]: “星宫早已派人探索此地。”铁心从飞船残骸中爬出，机械手臂扫描着周围的环境，“祭坛中心有高能量反应，疑似星核碎片。”
          - paragraph [ref=e174]: 晶璃皱眉，淡紫色的双眸闪烁着警惕的光芒：“空气中弥漫着冥族诅咒的气息，这里不是善地。”
          - paragraph [ref=e175]: 叶星走近祭坛，丹田内的虚空灵根自动吸收周围的虚空能量，修为隐隐有突破的迹象。他伸手触摸祭坛上的星纹，一股浩瀚的信息涌入脑海——
          - paragraph [ref=e176]: 星仙大战，天崩地裂，无数星仙陨落，血染星空……
          - paragraph [ref=e177]: 一座巍峨的星宫，内部却暗流涌动，背叛的阴影笼罩……
          - paragraph [ref=e178]: 一个婴儿被藏匿在星舟中，送往遥远的边缘星系……
          - paragraph [ref=e179]: “这是……”叶星喃喃道，意识被那些记忆碎片冲击得几乎昏厥。
          - paragraph [ref=e180]: 就在这时，祭坛上的符文突然亮起，一道虚影从祭坛中央浮现——那是一位身着星袍的老者，面容模糊，周身环绕着星辰虚影，正是星仙的残魂。
          - paragraph [ref=e181]: 残魂低语，声音如从远古传来：“星宫……背叛者……人造星核……毁灭……”
          - paragraph [ref=e182]: 叶星心中一震，正要开口询问，虚空中突然传来一阵冷笑。
          - paragraph [ref=e183]: “果然，虚空灵根的拥有者会引动星仙遗迹。”
          - paragraph [ref=e184]: 虚无尘脚踏混沌莲花，从虚空中走出，身后是十二艘星宫执法舰，将整个祭坛团团包围。
          - paragraph [ref=e185]: 四、正面交锋
          - paragraph [ref=e186]: “星宫巡查使，虚无尘。”晶璃冷冷道，手中凝聚出一柄晶族长剑，“灵婴期强者，我们不是对手。”
          - paragraph [ref=e187]: 铁心咬牙，机械手臂变形为灵能炮：“那就拼了！”
          - paragraph [ref=e188]: 叶星盯着虚无尘，眼中燃烧着怒火：“你摧毁了星仙残魂，就是为了掩盖星宫的罪行？”
          - paragraph [ref=e189]: 虚无尘轻笑，抬手祭出一枚血色星核——那星核通体血红，表面流转着冥族符文，散发着邪恶的气息。星核与祭坛产生共鸣，星仙残魂痛苦扭曲，发出凄厉的惨叫。
          - paragraph [ref=e190]: “星宫……背叛了星界……他们与冥族……合作……”残魂的声音断断续续，最终化作光点消散。
          - paragraph [ref=e191]: 叶星怒吼，催动虚空灵根，身形瞬间出现在虚无尘面前，一拳轰向他的面门。
          - paragraph [ref=e192]: 虚无尘不屑，抬手一掌拍出。
          - paragraph [ref=e193]: 掌拳相交，叶星只觉得一股浩瀚的力量涌入体内，五脏六腑仿佛被震碎。他喷出一口鲜血，身形倒飞出去，重重撞在祭坛上。
          - paragraph [ref=e194]: “筑域期对灵婴期，差距如天渊。”虚无尘冷冷道，“你连我一根手指都伤不了。”
          - paragraph [ref=e195]: 晶璃和铁心冲上前，想要掩护叶星，却被虚无尘随手一挥，震飞出去。
          - paragraph [ref=e196]: “晶族遗孤？机械飞升者后裔？”虚无尘看着两人，眼中闪过一丝不屑，“都是星宫实验台上的失败品罢了。”
          - paragraph [ref=e197]: 叶星挣扎着站起，体内虚空灵根疯狂运转，吸收着祭坛周围的虚空能量。他的修为开始突破，从筑域初期攀升至中期，再至后期。
          - paragraph [ref=e198]: “哦？临阵突破？”虚无尘挑眉，“可惜，还是不够。”
          - paragraph [ref=e199]: 他抬手，凝聚出一道金色剑光，斩向叶星。
          - paragraph [ref=e200]: 叶星咬牙，催动虚空灵根，撕裂空间，将三人传送到祭坛深处。
          - paragraph [ref=e201]: 虚无尘收剑，冷笑：“逃吧，仙遗星就是你的坟墓。”他转身，对执法队下令，“启动‘星傀计划’最终阶段，将整个仙遗星炼制成星傀母巢。”
          - paragraph [ref=e202]: 五、远古真相
          - paragraph [ref=e203]: 祭坛深处，叶星三人跌入一座地下宫殿。
          - paragraph [ref=e204]: 宫殿由星玉砌成，墙壁上刻满星纹，中央摆放着一具星仙骸骨——那骸骨通体晶莹，散发着淡淡的星光，显然生前修为极高。
          - paragraph [ref=e205]: 骸骨手中握着一枚黑色晶石，表面刻满冥族符文，散发着诡异的气息。
          - paragraph [ref=e206]: 叶星走近，伸手触碰那枚晶石。
          - paragraph [ref=e207]: 晶石突然化作一道流光，融入叶星体内。
          - paragraph [ref=e208]: 意识瞬间被拉入一片虚空战场——
          - paragraph [ref=e209]: 远古星仙与冥族之王的决战画面浮现。星仙们脚踏星辰，手持星器，与冥族大军厮杀。战场上血流成河，无数星仙陨落。
          - paragraph [ref=e210]: 画面一转，星宫始祖出现在战场上，他手持一柄血色长剑，与冥族之王并肩而立，共同对抗星仙大军。
          - paragraph [ref=e211]: “星宫……与冥族合作……”叶星喃喃道，心中震撼无以复加。
          - paragraph [ref=e212]: 就在这时，外界传来虚无尘的声音：“启动‘星傀计划’最终阶段，将整个仙遗星炼制成星傀母巢。”
          - paragraph [ref=e213]: 叶星猛地睁开眼，看到晶璃和铁心正焦急地看着他。
          - paragraph [ref=e214]: “叶星，你的身体在吸收祭坛的能量……快停下！”晶璃惊呼。
          - paragraph [ref=e215]: 叶星低头，看到自己身上浮现出一道道星纹，与祭坛上的星纹共鸣。丹田内，虚空晶体开始吸收祭坛中的虚空能量，修为再次突破，直接冲入筑域大圆满。
          - paragraph [ref=e216]: 但与此同时，一股邪恶的力量从黑色晶石中涌出，侵蚀着他的意识。
          - paragraph [ref=e217]: “冥族……在利用我……”叶星咬牙，试图压制那股力量。
          - paragraph [ref=e218]: 就在这时，铁心惊呼：“检测到大规模空间封锁，我们被困住了！”
          - paragraph [ref=e219]: 叶星抬头，看到祭坛周围浮现出一道道血色符文，将整个地下宫殿封锁。虚无尘的声音从外界传来：“叶星，你以为逃到这里就能活命？仙遗星就是星宫为你们这些‘实验品’准备的坟墓。”
          - paragraph [ref=e220]: 叶星握紧拳头，眼中闪过一丝决然。
          - paragraph [ref=e221]: 他看向那具星仙骸骨，骸骨的双眼中突然亮起两道幽蓝色的光芒，一道声音在他脑海中响起——
          - paragraph [ref=e222]: “虚空灵根的继承者，你终于来了……”
