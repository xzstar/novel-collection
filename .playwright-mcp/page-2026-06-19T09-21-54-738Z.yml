      - generic [ref=e8]: 星际修仙
      - generic [ref=e9]: 宇宙分为星域、星系、星界三大层级，星灵气弥漫虚空。修炼体系从练星期至星仙共十境，灵能科技与修真深度融合。七十二星域各有霸主，星宫与仙盟暗中角力。主角林星出身被诅咒的废星，天生‘星痕’体质可吞噬转化一切能量，被视为不祥。星宫表面维护秩序，实则秘密抓捕星痕者，企图激活远古星仙留下的‘星界之门’——打开后虽可永生，却会吞噬现有宇宙。主角从逃亡到反抗，最终揭露真相并选择守护宇宙。
